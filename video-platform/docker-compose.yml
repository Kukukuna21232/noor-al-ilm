version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: noor_video_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-noor_al_ilm}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [noor_video_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: noor_video_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks: [noor_video_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noor_video_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - backend_uploads:/app/uploads
      - backend_hls:/app/hls
      - backend_logs:/app/logs
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [noor_video_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dedicated transcoding worker
  transcoding_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noor_transcoding_worker
    restart: unless-stopped
    command: node src/workers/transcodingWorker.js
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - backend_uploads:/app/uploads
      - backend_hls:/app/hls
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [noor_video_net]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # AI worker
  ai_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noor_ai_worker
    restart: unless-stopped
    command: node src/workers/aiWorker.js
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [noor_video_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noor_video_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_VIDEO_API_URL: ${NEXT_PUBLIC_VIDEO_API_URL:-http://localhost:5001/api}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:5001}
    depends_on: [backend]
    networks: [noor_video_net]

  nginx:
    image: nginx:alpine
    container_name: noor_video_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_hls:/var/www/hls:ro
    depends_on: [frontend, backend]
    networks: [noor_video_net]

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_hls:
  backend_logs:

networks:
  noor_video_net:
    driver: bridge
