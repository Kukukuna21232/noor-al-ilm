name: Global Deployment Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security and Quality Checks
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: javascript, typescript

  # Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            frontend/.next
            frontend/out
            backend/dist

  # Container Image Building
  build-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [frontend, api-gateway, auth-service, content-service, ai-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to staging
        run: |
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n noor-al-ilm-staging
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} -n noor-al-ilm-staging
          kubectl rollout status deployment/frontend -n noor-al-ilm-staging
          kubectl rollout status deployment/api-gateway -n noor-al-ilm-staging

      - name: Run smoke tests
        run: |
          npm run test:smoke -- --env=staging

  # Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-images, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl for multiple regions
        run: |
          echo "${{ secrets.KUBE_CONFIG_US_EAST }}" | base64 -d > kubeconfig-us-east
          echo "${{ secrets.KUBE_CONFIG_EU_WEST }}" | base64 -d > kubeconfig-eu-west
          echo "${{ secrets.KUBE_CONFIG_ASIA_PACIFIC }}" | base64 -d > kubeconfig-asia-pacific

      - name: Deploy to US East
        run: |
          export KUBECONFIG=kubeconfig-us-east
          kubectl apply -f infrastructure/kubernetes/global-deployment.yaml
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n noor-al-ilm
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} -n noor-al-ilm
          kubectl rollout status deployment/frontend -n noor-al-ilm
          kubectl rollout status deployment/api-gateway -n noor-al-ilm

      - name: Deploy to EU West
        run: |
          export KUBECONFIG=kubeconfig-eu-west
          kubectl apply -f infrastructure/kubernetes/global-deployment.yaml
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n noor-al-ilm
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} -n noor-al-ilm
          kubectl rollout status deployment/frontend -n noor-al-ilm
          kubectl rollout status deployment/api-gateway -n noor-al-ilm

      - name: Deploy to Asia Pacific
        run: |
          export KUBECONFIG=kubeconfig-asia-pacific
          kubectl apply -f infrastructure/kubernetes/global-deployment.yaml
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n noor-al-ilm
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} -n noor-al-ilm
          kubectl rollout status deployment/frontend -n noor-al-ilm
          kubectl rollout status deployment/api-gateway -n noor-al-ilm

      - name: Update global DNS
        run: |
          # Update Cloudflare DNS for global load balancing
          curl -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "A",
              "name": "noor-al-ilm.com",
              "content": "${{ secrets.US_EAST_IP }}",
              "ttl": 300,
              "proxied": true
            }'

      - name: Run production health checks
        run: |
          npm run test:health -- --env=production
          npm run test:performance -- --env=production

  # Performance and Load Testing
  performance-test:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: |
          npm run test:performance -- --env=production --duration=300

      - name: Run load tests
        run: |
          npm run test:load -- --env=production --users=1000 --duration=600

      - name: Upload performance reports
        uses: actions/upload-artifact@v3
        with:
          name: performance-reports
          path: performance-reports/

  # Monitoring and Alerting Setup
  setup-monitoring:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Prometheus and Grafana
        run: |
          # Deploy monitoring stack
          kubectl apply -f infrastructure/monitoring/prometheus.yaml
          kubectl apply -f infrastructure/monitoring/grafana.yaml

      - name: Setup alerting rules
        run: |
          kubectl apply -f infrastructure/monitoring/alert-rules.yaml

      - name: Configure log aggregation
        run: |
          kubectl apply -f infrastructure/monitoring/fluentd.yaml

  # Database Migration
  migrate-database:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run database migrations
        run: |
          kubectl run migration-job --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} \
            --rm -i --restart=Never -- \
            npm run migrate

      - name: Seed database
        run: |
          kubectl run seed-job --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} \
            --rm -i --restart=Never -- \
            npm run seed

  # Cleanup
  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-production, performance-test]
    if: always()
    
    steps:
      - name: Cleanup old images
        run: |
          # Remove old Docker images from registry
          ghcr.io/token=$(echo "${{ secrets.GITHUB_TOKEN }}" | base64)
          curl -X DELETE "https://api.github.com/user/packages/container/${{ env.IMAGE_NAME }}/versions" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"

      - name: Cleanup old deployments
        run: |
          # Remove old Kubernetes deployments
          kubectl delete deployment -l app=old-version -n noor-al-ilm --ignore-not-found=true
